; HeadTracking NVSE Plugin Configuration
; Place this file alongside HeadTracking.dll in Data/NVSE/Plugins/

[Network]
; UDP port for OpenTrack data (default: 4242)
; Must match OpenTrack output configuration
Port=4242

[Sensitivity]
; Sensitivity multipliers for each axis (0.1-5.0)
; 1.0 = 1:1 mapping (1 degree head rotation = 1 degree camera rotation)
Yaw=1.0
Pitch=1.0
Roll=1.0

[Smoothing]
; Smoothing factor for camera movement
; 0.0 = no smoothing (direct/raw input)
; 0.99 = maximum smoothing (very slow response)
; Recommended: 0.3-0.6 for smooth but responsive tracking
Amount=0.7

[Hotkeys]
; Nav-cluster virtual key codes (hex). Each action also accepts a fixed
; Ctrl+Shift+<letter> chord (T/Y/G/H) which is not configurable.
; Home=0x24, End=0x23, PageUp=0x21, PageDown=0x22
;
; Avoid keys used by the game:
;   F5=Quicksave, F9=Quickload, TAB=Pip-Boy, ESC=Pause
Recenter=0x24
Toggle=0x23
CycleTrackingMode=0x21
ReticleToggle=0x22
DebounceMs=200

[Deadzone]
; Deadzone in degrees for each axis
; Movements smaller than this will be ignored (reduces jitter)
; Set to 0 to disable deadzone
; Recommended: 0.5-2.0 depending on tracker stability
Yaw=0.0
Pitch=0.0
Roll=0.0

[GameState]
; Input blocking mode - when to disable hotkeys
; 0 = Never (always process hotkeys, even in menus)
; 1 = Menus only (block during pause menu, pipboy, etc.)
; 2 = All dialogue (block during menus AND NPC conversations)
; 3 = All overlays (block during any overlay: menus, console, VATS, etc.)
; Default: 0 (hotkeys always work)
InputBlockMode=0

; Track in third-person camera mode (1=yes, 0=no)
; Default: 1 (head tracking works in both first and third person)
TrackInThirdPerson=1

; Track during VATS (1=yes, 0=no)
; Default: 0 (VATS has its own camera control)
TrackInVATS=0

; Pause tracking during combat (1=yes, 0=no)
; Default: 0 (head tracking continues during combat)
PauseDuringCombat=0

[Feedback]
; Show on-screen messages when toggling/recentering (1=yes, 0=no)
ShowMessages=1

[Camera]
; 0 = Coupled (head tracking moves camera + aim + movement)
; 1 = Decoupled (free-look via D3D9 hook, aim stays independent)
; 2 = BodyTracking (pitch tracking only, yaw disabled)
Mode=1
